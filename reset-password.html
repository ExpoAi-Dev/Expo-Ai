<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Expoloom AI</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0f172a; color: #fff; }
        .box { text-align: center; width: 85%; max-width: 340px; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        h2 { margin-top: 0; margin-bottom: 10px; font-weight: 600; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        input { padding: 12px; width: 100%; border: 1px solid #334155; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; background: #0f172a; color: #fff; outline: none; }
        button { background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Set New Password</h2>
        <p>Please enter a strong new password below.</p>
        <input type="password" id="newPassword" placeholder="New Password (min 6 characters)">
        <button onclick="updatePassword()">Update Password</button>
    </div>

    <script>
        function getAccessTokenFromURL() {
            const hash = window.location.hash;
            if (!hash) return null;
            const params = new URLSearchParams(hash.replace('#', '?'));
            return params.get('access_token');
        }

        async function updatePassword() {
            const password = document.getElementById('newPassword').value;
            const token = getAccessTokenFromURL();

            if (!token) {
                return alert("Invalid or expired session link. Please request a new recovery link.");
            }
            if (password.length < 6) {
                return alert("Password must be at least 6 characters long.");
            }

            try {
                const response = await fetch('/api/auth/update-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, access_token: token })
                });
                const data = await response.json();
                if (response.ok) {
                    alert("Password successfully updated! Redirecting to login...");
                    window.location.href = '/';
                } else {
                    alert(data.error || "Failed to update password.");
                }
            } catch (e) {
                alert("An error occurred during verification.");
            }
        }
    </script>
</body>
</html>
