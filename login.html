<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – Expoloom AI</title>
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#080c14; --surface:#0e1624; --surface2:#131d2e; --border:rgba(99,130,181,0.14); --accent:#3b7ef8; --accent-hi:#5a95ff; --text:#e8edf5; --muted:#6b7fa3; --error:#f06b6b; --glow:rgba(59,126,248,0.18); --font-display:'Space Grotesk', sans-serif; --font-body:'Inter', sans-serif; --radius-sm:10px; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; -webkit-font-smoothing: antialiased; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 20px; background-image: linear-gradient(rgba(59,126,248,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59,126,248,0.03) 1px, transparent 1px); background-size: 40px 40px; }
    body::before { content: ''; position: fixed; top: -120px; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(ellipse at center, rgba(59,126,248,0.12) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .card { position: relative; z-index: 1; width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px 36px; box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03) inset; animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .brand-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #6a4fff); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 16px var(--glow); flex-shrink: 0; }
    .brand-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
    h1 { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.2px; }
    input[type="email"], input[type="password"], input[type="text"] { width: 100%; padding: 13px 15px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input::placeholder { color: var(--muted); opacity: 0.6; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,126,248,0.14); }
    .field-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .forgot-link { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .forgot-link:hover { color: var(--accent-hi); }
    .primary-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; margin-bottom: 20px; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 16px rgba(59,126,248,0.3); }
    .primary-btn:hover { background: var(--accent-hi); box-shadow: 0 6px 20px rgba(59,126,248,0.4); }
    .primary-btn:active { transform: scale(0.99); }
    .primary-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; color: var(--muted); font-size: 12px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    
    .google-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    
    .links { text-align: center; font-size: 13.5px; color: var(--muted); }
    .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .links a:hover { color: var(--accent-hi); text-decoration: underline; }
    .error-banner { display: none; background: rgba(240,107,107,0.1); border: 1px solid rgba(240,107,107,0.3); border-radius: var(--radius-sm); padding: 11px 14px; font-size: 13px; color: var(--error); margin-bottom: 16px; animation: shake 0.3s ease; }
    .error-banner.visible { display: flex; align-items: center; gap: 8px; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-mark">⚡</div>
    <span class="brand-name">Expoloom AI</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to continue your conversations.</p>

  <div id="errorMsg" class="error-banner" role="alert">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errorText"></span>
  </div>

  <div class="field">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
  </div>

  <div class="field">
    <div class="field-row">
      <label for="password" style="margin-bottom:0;">Password</label>
      <a href="/forgot-password.html" class="forgot-link">Forgot password?</a>
    </div>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
  </div>

  <button class="primary-btn" id="signInBtn" onclick="signInEmail()">Sign in</button>

  <div class="divider">or</div>

  <div id="g_id_onload"
       data-client_id="410619258030-6oht0c2kjpqeqbk7gd2np0mdpst9sjmi.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleGoogleLogin"
       data-auto_prompt="false">
  </div>
  <div class="google-wrap">
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="filled_black"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="center"
         data-width="250">
    </div>
  </div>

  <div class="links">
    Don't have an account? <a href="/signup.html">Sign up</a>
  </div>
</div>

<script>
  function showError(msg) {
    const banner = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    banner.classList.add('visible');
    banner.style.animation = 'none';
    requestAnimationFrame(() => { banner.style.animation = ''; });
  }
  function hideError() { document.getElementById('errorMsg').classList.remove('visible'); }

  async function signInEmail() {
    hideError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signInBtn');

    if (!email || !password) { showError("Please enter both email and password."); return; }

    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
        const res = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'login', email, password })
        });
        const data = await res.json();

        if (data.success) {
            finalizeLogin(data.session);
        } else {
            showError(data.error);
        }
    } catch (err) { 
        showError("Connection error. Please try again."); 
    } finally { 
        btn.disabled = false; btn.textContent = 'Sign in'; 
    }
  }

  async function handleGoogleLogin(response) {
    hideError();
    try {
        const res = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'google', token: response.credential })
        });
        const data = await res.json();

        if (data.success) {
            finalizeLogin(data.session);
        } else {
            showError(data.error);
        }
    } catch (err) { 
        showError("Google authentication failed. Please try again."); 
    }
  }

  function finalizeLogin(sessionData) {
    localStorage.setItem("sb_access_token", sessionData.access_token);
    // Save refresh token so we can silently renew the session after it expires
    localStorage.setItem("sb_refresh_token", sessionData.refresh_token);
    // Save expiry time (unix seconds) so we know when to refresh
    localStorage.setItem("sb_expires_at", sessionData.expires_at || (Math.floor(Date.now() / 1000) + (sessionData.expires_in || 3600)));
    const userObj = {
        name: sessionData.user.user_metadata?.name || sessionData.user.user_metadata?.full_name || "User",
        email: sessionData.user.email,
        picture: sessionData.user.user_metadata?.avatar_url || sessionData.user.user_metadata?.picture || ""
    };
    localStorage.setItem("authUser", JSON.stringify(userObj));
    window.location.href = "/";
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') signInEmail(); });
</script>
</body>
</html>
