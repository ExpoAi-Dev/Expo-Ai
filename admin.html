<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expoloom AI</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: #ffffff; 
        }
        .login-box { 
            text-align: center; 
            width: 85%; 
            max-width: 320px; 
        }
        h2 { margin-bottom: 25px; font-weight: 600; }
        input { 
            padding: 15px; 
            width: 100%; 
            border: 1px solid #000; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
        }
        button { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Expoloom AI</h2>
        <input type="password" id="adminPassword" placeholder="Enter Admin Password">
        <button onclick="checkPass()">Next</button>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('adminPassword').value;
            if (pass) {
                // Point to the /stats function endpoint, NOT /stats.html
                window.location.href = '/stats?key=' + encodeURIComponent(pass);
            } else {
                alert("Please enter a password");
            }
        }
        
        // Bonus: Allow pressing "Enter" to submit the password
        document.getElementById('adminPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPass();
            }
        });
    </script>

</body>
</html>
