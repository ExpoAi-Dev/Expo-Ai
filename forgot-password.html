<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Expoloom AI</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0f172a; color: #fff; }
        .box { text-align: center; width: 85%; max-width: 340px; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        h2 { margin-top: 0; margin-bottom: 10px; font-weight: 600; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        input { padding: 12px; width: 100%; border: 1px solid #334155; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; background: #0f172a; color: #fff; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
        .back-link { margin-top: 20px; display: block; color: #3b82f6; text-decoration: none; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Forgot Password?</h2>
        <p>Enter your email address and we'll send you a secure link to reset your password.</p>
        <input type="email" id="resetEmail" placeholder="Enter your email address">
        <button onclick="sendResetLink()">Send Reset Link</button>
        <a href="/" class="back-link">Back to Login</a>
    </div>

    <script>
        async function sendResetLink() {
            const email = document.getElementById('resetEmail').value.trim();
            if(!email) return alert("Please enter your email address.");

            try {
                const response = await fetch('/api/auth/recover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if(response.ok) {
                    alert("A password reset link has been sent to your email inbox!");
                } else {
                    alert(data.error || "An error occurred. Please try again.");
                }
            } catch(e) {
                alert("Connection failed. Please check your internet connection.");
            }
        }
    </script>
</body>
</html>
