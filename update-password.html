<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password – Expoloom AI</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080c14;--surface:#0e1624;--surface2:#131d2e;--border:rgba(99,130,181,0.14);--accent:#3b7ef8;--accent-hi:#5a95ff;--text:#e8edf5;--muted:#6b7fa3;--error:#f06b6b;--success:#34d399;--glow:rgba(59,126,248,0.18);--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--radius-sm:10px;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;-webkit-font-smoothing:antialiased;}
    body{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;background-image:linear-gradient(rgba(59,126,248,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,126,248,0.03) 1px,transparent 1px);background-size:40px 40px;}
    body::before{content:'';position:fixed;top:-120px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse at center,rgba(59,126,248,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
    .card{position:relative;z-index:1;width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px 36px;box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.03) inset;animation:slideUp 0.4s cubic-bezier(0.22,1,0.36,1) both;}
    @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .brand-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#6a4fff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px var(--glow);}
    .brand-name{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-0.3px;}
    h1{font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:-0.4px;margin-bottom:8px;}
    .subtitle{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
    .field{margin-bottom:14px;}
    label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;}
    input[type="password"]{width:100%;padding:13px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    input::placeholder{color:var(--muted);opacity:0.6;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,126,248,0.14);}
    .primary-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;margin-bottom:20px;transition:background 0.2s,box-shadow 0.2s;box-shadow:0 4px 16px rgba(59,126,248,0.3);}
    .primary-btn:hover{background:var(--accent-hi);box-shadow:0 6px 20px rgba(59,126,248,0.4);}
    .primary-btn:disabled{opacity:0.55;cursor:not-allowed;}
    .status-box{display:none;padding:14px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:16px;line-height:1.5;}
    .status-box.error{background:rgba(240,107,107,0.1);border:1px solid rgba(240,107,107,0.3);color:var(--error);}
    .status-box.success{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);color:var(--success);}
    .strength-bar { height:3px; border-radius:2px; margin-top:6px; background:var(--border); overflow:hidden; }
    .strength-fill { height:100%; width:0; border-radius:2px; transition:width 0.3s,background 0.3s; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-mark">⚡</div>
    <span class="brand-name">Expoloom AI</span>
  </div>

  <h1>Set new password</h1>
  <p class="subtitle" id="pageSubtitle">Please enter your new secure password below.</p>

  <div id="statusBox" class="status-box"></div>

  <div id="formContainer">
    <div class="field">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password" oninput="updateStrength(this.value)" required>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <button class="primary-btn" id="saveBtn" onclick="saveNewPassword()">Update password</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://wcrtftqldlqvybwtlvim.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjcnRmdHFsZGxxdnlid3RsdmltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5Nzk1MzIsImV4cCI6MjA5NDU1NTUzMn0.wChKXrrCIuNRxfs5o-mOx8cIHusTzAJhXSdRzqSTVTk';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check if the user actually arrived via a recovery link
  window.onload = () => {
    const hash = window.location.hash;
    if (!hash || !hash.includes('type=recovery')) {
      const box = document.getElementById('statusBox');
      document.getElementById('formContainer').style.display = 'none';
      box.className = 'status-box error';
      box.innerHTML = 'Invalid or expired recovery link. <a href="/forgot-password.html" style="color:var(--accent)">Request a new one</a>.';
      box.style.display = 'block';
    }
  };

  // Password strength meter
  function updateStrength(val) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pct = (score / 4) * 100;
    const colors = ['#f06b6b','#f59e0b','#3b7ef8','#34d399'];
    fill.style.width = pct + '%';
    fill.style.background = colors[score - 1] || 'transparent';
  }

  // Handle the password update
  async function saveNewPassword() {
    const password = document.getElementById('newPassword').value;
    const box = document.getElementById('statusBox');
    const btn = document.getElementById('saveBtn');
    
    box.className = 'status-box'; box.style.display = 'none';
    
    if (password.length < 8) { 
      box.className = 'status-box error'; 
      box.textContent = 'Password must be at least 8 characters long.'; 
      box.style.display = 'block'; 
      return; 
    }

    btn.disabled = true; btn.textContent = 'Updating...';

    try {
      const { data, error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        box.className = 'status-box error';
        box.textContent = error.message;
      } else {
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('pageSubtitle').style.display = 'none';
        box.className = 'status-box success';
        box.innerHTML = 'Password updated successfully! Redirecting to login...';
        
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);
      }
      box.style.display = 'block';
    } catch (err) {
      box.className = 'status-box error'; 
      box.textContent = 'Connection failed. Please check your internet.'; 
      box.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = 'Update password';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') saveNewPassword(); });
</script>
</body>
</html>
